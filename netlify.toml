[build]
  command = "pnpm install && pnpm --filter @workspace/taurus-website run build"
  publish = "artifacts/taurus-website/dist/public"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9"
  PORT         = "3000"
  BASE_PATH    = "/"

# Long-lived cache for static assets
[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.mp4"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# SPA fallback — all routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
