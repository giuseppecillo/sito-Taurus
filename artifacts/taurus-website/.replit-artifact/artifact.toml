kind = "web"
previewPath = "/"
title = "Taurus AgriTech Solutions"
version = "1.0.0"
id = "artifacts/taurus-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26083

[services.development]
run = "pnpm --filter @workspace/taurus-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/taurus-website", "run", "build" ]
publicDir = "artifacts/taurus-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26083"
BASE_PATH = "/"
