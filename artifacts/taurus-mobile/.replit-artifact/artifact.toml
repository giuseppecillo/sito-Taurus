kind = "mobile"
previewPath = "/mobile/"
title = "Taurus 2.0 VRT Mobile"
version = "1.0.0"
id = "artifacts/taurus-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/mobile/" ]
localPort = 23687

[services.development]
run = "pnpm --filter @workspace/taurus-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/taurus-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/taurus-mobile", "run", "serve" ]

[services.env]
PORT = "23687"
BASE_PATH = "/mobile/"
